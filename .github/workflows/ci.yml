name: CI

# Run the pure-logic test suite on every push and pull request.
# The GUI layer (Tkinter) is intentionally NOT exercised here: CI runners are
# headless and the app's UI modules require a display. All business logic lives
# in pure modules under src/ and is fully covered by tests/.

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run pure-logic test suite
        run: pytest -q
